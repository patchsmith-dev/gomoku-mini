<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gomoku Mini</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-surface" aria-labelledby="game-title">
        <div class="top-bar">
          <div>
            <p class="eyebrow">Open source board game</p>
            <h1 id="game-title">Gomoku Mini</h1>
          </div>
          <div class="actions" aria-label="Game controls">
            <button id="undo-button" type="button">Undo</button>
            <button id="reset-button" type="button">Reset</button>
          </div>
        </div>

        <div class="play-layout">
          <div class="board-wrap">
            <div
              id="board"
              class="board"
              role="grid"
              aria-label="Gomoku board"
              aria-rowcount="15"
              aria-colcount="15"
            ></div>
          </div>

          <aside class="side-panel" aria-label="Game status">
            <div class="setup-panel" aria-label="Game setup">
              <div class="mode-row">
                <span class="label">Mode</span>
                <div class="segmented-control" role="radiogroup" aria-label="Game mode">
                  <label>
                    <input type="radio" name="game-mode" value="two-player" checked />
                    <span>Two Player</span>
                  </label>
                  <label>
                    <input type="radio" name="game-mode" value="computer" />
                    <span>Computer</span>
                  </label>
                </div>
              </div>
              <label class="name-field">
                <span class="label">Black</span>
                <input id="black-name-input" type="text" maxlength="24" placeholder="Black" autocomplete="off" />
              </label>
              <label class="name-field">
                <span class="label">White</span>
                <input id="white-name-input" type="text" maxlength="24" placeholder="White" autocomplete="off" />
              </label>
              <label class="difficulty-field">
                <span class="label">Difficulty</span>
                <select id="difficulty-select">
                  <option value="normal">Normal</option>
                  <option value="easy">Easy</option>
                </select>
              </label>
              <label class="contrast-toggle">
                <input id="contrast-toggle" type="checkbox" />
                <span>High contrast</span>
              </label>
              <label class="timer-toggle">
                <input id="timer-toggle" type="checkbox" />
                <span>Timer</span>
              </label>
            </div>
            <div class="status-block">
              <span class="label">Turn</span>
              <strong id="turn-label">Black</strong>
            </div>
            <div class="status-block">
              <span class="label">Result</span>
              <strong id="result-label">Playing</strong>
            </div>
            <div class="status-block">
              <span class="label">Time</span>
              <strong id="elapsed-time-label">Off</strong>
            </div>
            <p id="status-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></p>
            <div class="score-grid">
              <div>
                <span class="stone-sample black"></span>
                <span id="black-score-name">Black</span>
                <strong id="black-count">0</strong>
              </div>
              <div>
                <span class="stone-sample white"></span>
                <span id="white-score-name">White</span>
                <strong id="white-count">0</strong>
              </div>
            </div>
            <div class="history-box">
              <div class="history-head">
                <span class="label">Moves</span>
                <strong id="move-count">0</strong>
              </div>
              <ol id="move-history" aria-label="Move history"></ol>
            </div>
            <div class="recent-match">
              <div>
                <span class="label">Recent Match</span>
                <strong id="recent-match-label">No completed match yet</strong>
                <time id="recent-match-time" dateTime=""></time>
              </div>
              <button id="clear-recent-button" type="button">Clear</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="src/engine.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
