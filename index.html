<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gomoku Mini</title>
    <link rel="stylesheet" href="src/styles.css?v=0.4.5" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-surface" aria-labelledby="game-title">
        <div class="top-bar">
          <div>
            <p class="eyebrow" data-i18n="eyebrow">Open source board game</p>
            <h1 id="game-title">Gomoku Mini</h1>
          </div>
          <div class="actions" aria-label="Game controls" data-i18n-aria="gameControls">
            <button id="hint-button" type="button" data-i18n="hint">Hint</button>
            <button id="copy-position-button" type="button" data-i18n="copyPosition">Copy Position</button>
            <button id="copy-board-button" type="button" data-i18n="copyBoard">Copy Board</button>
            <button id="resign-button" type="button" data-i18n="resign">Resign</button>
            <button id="undo-button" type="button" data-i18n="undo">Undo</button>
            <button id="reset-button" type="button" data-i18n="reset">Reset</button>
          </div>
        </div>

        <div class="play-layout">
          <div class="board-wrap">
            <div class="board-frame">
              <div class="coord-strip coord-strip-top" aria-hidden="true">
                <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span
                ><span>H</span><span>I</span><span>J</span><span>K</span><span>L</span><span>M</span><span>N</span
                ><span>O</span>
              </div>
              <div class="coord-strip coord-strip-left" aria-hidden="true">
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span
                ><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span><span>14</span
                ><span>15</span>
              </div>
              <div
                id="board"
                class="board"
                role="grid"
                aria-label="Gomoku board"
                data-i18n-aria="board"
                aria-rowcount="15"
                aria-colcount="15"
              ></div>
              <div class="coord-strip coord-strip-right" aria-hidden="true">
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span
                ><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span><span>14</span
                ><span>15</span>
              </div>
              <div class="coord-strip coord-strip-bottom" aria-hidden="true">
                <span>A</span><span>B</span><span>C</span><span>D</span><span>E</span><span>F</span><span>G</span
                ><span>H</span><span>I</span><span>J</span><span>K</span><span>L</span><span>M</span><span>N</span
                ><span>O</span>
              </div>
            </div>
            <div class="selected-cell-status" aria-live="polite">
              <span class="label" data-i18n="selectedCell">Selected</span>
              <strong id="selected-cell-label">A1</strong>
            </div>
          </div>

          <aside class="side-panel" aria-label="Game status" data-i18n-aria="gameStatus">
            <div class="setup-panel" aria-label="Game setup" data-i18n-aria="gameSetup">
              <label class="language-field">
                <span class="label" data-i18n="language">Language</span>
                <select id="language-select" aria-label="Language" data-i18n-aria="language">
                  <option value="en">English</option>
                  <option value="zh">中文</option>
                </select>
              </label>
              <label class="theme-field">
                <span class="label" data-i18n="theme">Theme</span>
                <select id="theme-select" aria-label="Theme" data-i18n-aria="theme">
                  <option value="classic" data-i18n="classicTheme" selected>Classic</option>
                  <option value="forest" data-i18n="forestTheme">Forest</option>
                  <option value="midnight" data-i18n="midnightTheme">Midnight</option>
                </select>
              </label>
              <div class="mode-row">
                <span class="label" data-i18n="mode">Mode</span>
                <div class="segmented-control" role="radiogroup" aria-label="Game mode" data-i18n-aria="gameMode">
                  <label>
                    <input type="radio" name="game-mode" value="two-player" checked />
                    <span data-i18n="twoPlayer">Two Player</span>
                  </label>
                  <label>
                    <input type="radio" name="game-mode" value="computer" />
                    <span data-i18n="computer">Computer</span>
                  </label>
                </div>
              </div>
              <label class="name-field">
                <span class="label" data-i18n="black">Black</span>
                <input id="black-name-input" type="text" maxlength="24" placeholder="Black" autocomplete="off" />
              </label>
              <label class="name-field">
                <span class="label" data-i18n="white">White</span>
                <input id="white-name-input" type="text" maxlength="24" placeholder="White" autocomplete="off" />
              </label>
              <label class="difficulty-field">
                <span class="label" data-i18n="difficulty">Difficulty</span>
                <select id="difficulty-select">
                  <option value="easy" data-i18n="easy">Easy</option>
                  <option value="normal" data-i18n="normal" selected>Normal</option>
                  <option value="hard" data-i18n="hard">Hard</option>
                  <option value="extreme" data-i18n="extreme">Extreme</option>
                </select>
              </label>
              <label class="computer-side-field">
                <span class="label" data-i18n="computerSide">Computer side</span>
                <select id="computer-side-select" aria-label="Computer side" data-i18n-aria="computerSide">
                  <option value="white" data-i18n="white" selected>White</option>
                  <option value="black" data-i18n="black">Black</option>
                </select>
              </label>
              <label class="opening-field">
                <span class="label" data-i18n="opening">Opening</span>
                <select id="opening-select" aria-label="Opening" data-i18n-aria="opening">
                  <option value="center" data-i18n="centerOpening" selected>Center</option>
                  <option value="varied" data-i18n="variedOpening">Varied</option>
                </select>
              </label>
              <label class="contrast-toggle">
                <input id="contrast-toggle" type="checkbox" />
                <span data-i18n="highContrast">High contrast</span>
              </label>
              <label class="timer-toggle">
                <input id="timer-toggle" type="checkbox" />
                <span data-i18n="timer">Timer</span>
              </label>
              <label class="move-numbers-toggle">
                <input id="move-numbers-toggle" type="checkbox" />
                <span data-i18n="moveNumbers">Move numbers</span>
              </label>
            </div>
            <div class="status-block">
              <span class="label" data-i18n="turn">Turn</span>
              <strong id="turn-label">Black</strong>
            </div>
            <div class="status-block">
              <span class="label" data-i18n="result">Result</span>
              <strong id="result-label">Playing</strong>
            </div>
            <div class="status-block">
              <span class="label" data-i18n="time">Time</span>
              <strong id="elapsed-time-label">Off</strong>
            </div>
            <p id="status-announcer" class="visually-hidden" aria-live="polite" aria-atomic="true"></p>
            <div class="score-grid">
              <div>
                <span class="stone-sample black"></span>
                <span id="black-score-name">Black</span>
                <strong id="black-count">0</strong>
              </div>
              <div>
                <span class="stone-sample white"></span>
                <span id="white-score-name">White</span>
                <strong id="white-count">0</strong>
              </div>
            </div>
            <div class="history-box">
              <div class="history-head">
                <div>
                  <span class="label" data-i18n="moves">Moves</span>
                  <strong id="move-count">0</strong>
                </div>
                <button id="copy-moves-button" type="button" data-i18n="copyMoves">Copy Moves</button>
              </div>
              <ol id="move-history" aria-label="Move history" data-i18n-aria="moveHistory"></ol>
            </div>
            <div class="recent-match">
              <div>
                <span class="label" data-i18n="recentMatch">Recent Match</span>
                <strong id="recent-match-label">No completed match yet</strong>
                <time id="recent-match-time" dateTime=""></time>
              </div>
              <div class="recent-actions">
                <button id="copy-recent-button" type="button" data-i18n="copy">Copy</button>
                <button id="clear-recent-button" type="button" data-i18n="clear">Clear</button>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="src/engine.js?v=0.4.5"></script>
    <script src="src/main.js?v=0.4.5"></script>
  </body>
</html>
